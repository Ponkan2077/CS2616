<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — RubberGuard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  {% load static %}
  <link href="{% static 'css/style.css' %}?v={{ STATIC_VERSION }}" rel="stylesheet">
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-icon">
        <i class="bi bi-shield-fill"></i>
        <i class="bi bi-tree-fill brand-icon-tree"></i>
      </div>
      <div class="auth-brand-title">RubberGuard</div>
      <div class="auth-brand-sub">Hevea brasiliensis Disease Detection System</div>
    </div>

    {% if form.errors %}
    <div class="auth-error">
      <i class="bi bi-exclamation-circle-fill"></i> Invalid username or password. Please try again.
    </div>
    {% endif %}

    {% if messages %}
      {% for message in messages %}
      <div class="{% if message.tags == 'error' %}auth-error{% else %}auth-success{% endif %}">
        <i class="bi {% if message.tags == 'error' %}bi-exclamation-circle-fill{% else %}bi-check-circle-fill{% endif %}"></i> {{ message }}
      </div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="auth-field">
        <label for="id_username">Username</label>
        <input type="text" name="username" id="id_username" class="form-control-rg" required autofocus>
      </div>
      <div class="auth-field">
        <label for="id_password">Password</label>
        <input type="password" name="password" id="id_password" class="form-control-rg" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 mt-2">
        <i class="bi bi-box-arrow-in-right"></i> Log In
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="{% url 'register' %}">Create one</a>
    </div>
  </div>
</body>
</html>
