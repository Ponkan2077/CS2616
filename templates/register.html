<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — RubberGuard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  {% load static %}
  <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-icon"><i class="bi bi-tree-fill"></i></div>
      <div class="auth-brand-title">RubberGuard</div>
      <div class="auth-brand-sub">Create your account</div>
    </div>

    {% if form.errors %}
    <div class="auth-error">
      <i class="bi bi-exclamation-circle-fill"></i>
      {% for field in form %}{% for error in field.errors %}{{ error }} {% endfor %}{% endfor %}
      {% for error in form.non_field_errors %}{{ error }} {% endfor %}
    </div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="auth-field">
        <label for="id_username">Username</label>
        <input type="text" name="username" id="id_username" class="form-control-rg" required autofocus>
      </div>
      <div class="auth-field">
        <label for="id_password1">Password</label>
        <input type="password" name="password1" id="id_password1" class="form-control-rg" required>
      </div>
      <div class="auth-field">
        <label for="id_password2">Confirm Password</label>
        <input type="password" name="password2" id="id_password2" class="form-control-rg" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 mt-2">
        <i class="bi bi-person-plus-fill"></i> Create Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{% url 'login' %}">Log in</a>
    </div>
  </div>
</body>
</html>
